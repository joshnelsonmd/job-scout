<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#1e40af"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JobScout"/>
<title>JobScout</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}
body{background:#f9fafb}
.cs{box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04)}
.lc2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sh::-webkit-scrollbar{display:none}.sh{-ms-overflow-style:none;scrollbar-width:none}
.st{border-width:4px;font-weight:800;letter-spacing:2px;padding:6px 16px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease-out}.as:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;
const D={lastUpdated:"2026-03-25T05:00:00",searchProfile:{specialty:"Emergency Medicine & Critical Care",minRate:"$200/hr",location:"Anywhere (based near Haddonfield, NJ)"},jobs:[{id:"s1",title:"Emergency Medicine Locum Tenens",company:"Weatherby Healthcare",location:"Philadelphia, PA",distance:"25 min",type:"locum",pay:"$275/hr",schedule:"12-hr shifts, weekends available",description:"Level 1 trauma center seeking BC emergency medicine physician for ongoing locum coverage. Flexible scheduling, malpractice provided.",url:"https://weatherbyhealthcare.com",postedDate:"2026-03-23",tags:["EM","Locum","Local"],highlight:"Strong rate + 25 min from home"},{id:"s2",title:"Tele-ICU Intensivist",company:"Advanced ICU Care",location:"Remote",distance:"Remote",type:"telemedicine",pay:"$240/hr",schedule:"7-on/7-off blocks, flexible start",description:"Tele-ICU coverage for multi-hospital system. Board-certified critical care required. Full remote with equipment provided.",url:"https://advancedicucare.com",postedDate:"2026-03-24",tags:["Critical Care","Tele-ICU","Remote"],highlight:"Fully remote, solid pay"},{id:"s3",title:"Medical-Legal Expert Witness",company:"SEAK Expert Witness Network",location:"Remote",distance:"Remote",type:"consulting",pay:"$400-600/hr",schedule:"Case-by-case, ~5-10 hrs/month",description:"Seeking board-certified EM physicians for medical-legal case review, depositions, and trial testimony.",url:"https://seak.com",postedDate:"2026-03-20",tags:["Expert Witness","Consulting","Remote"],highlight:"Top-tier rate, minimal time"},{id:"s4",title:"Urgent Care Per Diem",company:"Patient First",location:"Cherry Hill, NJ",distance:"15 min",type:"urgent-care",pay:"$210/hr",schedule:"Pick your shifts, 8-10 hr days",description:"Per diem urgent care physician needed. Walk-in volume with minor procedures. Choose your own shifts.",url:"https://patientfirst.com/careers",postedDate:"2026-03-22",tags:["Urgent Care","Per Diem","Local"],highlight:"15 min away, pick your schedule"},{id:"s5",title:"ICU Locum Weekend Coverage",company:"CompHealth",location:"Wilmington, DE",distance:"40 min",type:"locum",pay:"$260/hr",schedule:"Sat-Sun 7a-7p, ongoing",description:"Community hospital ICU seeking weekend intensivist. 12-bed unit, closed ICU model. BC critical care required.",url:"https://comphealth.com",postedDate:"2026-03-24",tags:["Critical Care","Locum","Weekends"],highlight:"Weekends only, weekdays free"},{id:"s6",title:"Utilization Review Physician",company:"Dane Street",location:"Remote",distance:"Remote",type:"consulting",pay:"$215/hr",schedule:"Flexible, 10-20 hrs/week",description:"Remote utilization review and peer-to-peer calls for EM and critical care cases. Fully asynchronous workflow.",url:"https://danestreet.com",postedDate:"2026-03-21",tags:["UR","Consulting","Remote"],highlight:"Async remote work, flex hours"}],refinementQuestions:[{id:"q1",question:"I found tele-ICU night positions at $240/hr. Keep including night shifts?",options:["Yes, include nights if $240+","Only daytime tele-ICU","Skip tele-ICU entirely"]},{id:"q2",question:"Expert witness firms are recruiting EM physicians. Prioritize consulting?",options:["Yes, prioritize consulting","Keep balanced mix","Focus on clinical shifts"]},{id:"q3",question:"Travel locums (fly-out, 1-week blocks) paying $300+/hr. Include?",options:["Yes, show travel gigs","Only if $350+/hr","Local and remote only"]}]};
const TC={locum:{l:"Locum Tenens",bg:"#3b82f6",i:"\u{1F3E5}"},telemedicine:{l:"Telemedicine",bg:"#8b5cf6",i:"\u{1F4BB}"},"urgent-care":{l:"Urgent Care",bg:"#10b981",i:"\u{1FA7A}"},consulting:{l:"Consulting",bg:"#f59e0b",i:"\u{1F4CB}"}};
function SwipeCard({job,onLeft,onRight,isTop}){const sX=useRef(0),cX=useRef(0),dr=useRef(false);const[off,setOff]=useState(0),[dec,setDec]=useState(null),[exp,setExp]=useState(false);const t=TC[job.type]||TC.locum,TH=100;
const oS=useCallback(cx=>{if(!isTop)return;dr.current=true;sX.current=cx;cX.current=cx},[isTop]);
const oM=useCallback(cx=>{if(!dr.current)return;cX.current=cx;const d=cx-sX.current;setOff(d);setDec(d>50?"interested":d<-50?"pass":null)},[]);
const oE=useCallback(()=>{if(!dr.current)return;dr.current=false;const d=cX.current-sX.current;if(d>TH){setOff(500);setTimeout(()=>onRight(job),200)}else if(d<-TH){setOff(-500);setTimeout(()=>onLeft(job),200)}else{setOff(0);setDec(null)}},[job,onLeft,onRight]);
return(<div style={{position:"absolute",inset:0,zIndex:isTop?10:0,transform:`translateX(${off}px) rotate(${off*.04}deg)`,opacity:Math.max(.4,1-Math.abs(off)/400),transition:dr.current?"none":"all .3s ease-out",touchAction:"pan-y",userSelect:"none"}} onTouchStart={e=>oS(e.touches[0].clientX)} onTouchMove={e=>oM(e.touches[0].clientX)} onTouchEnd={oE} onMouseDown={e=>oS(e.clientX)} onMouseMove={e=>oM(e.clientX)} onMouseUp={oE} onMouseLeave={()=>{if(dr.current)oE()}}>
<div className="bg-white rounded-2xl cs overflow-hidden flex flex-col" style={{height:"100%"}}>
{dec&&<div style={{position:"absolute",top:24,zIndex:20,...(dec==="interested"?{left:20,color:"#10b981",borderColor:"#10b981",transform:"rotate(-12deg)"}:{right:20,color:"#ef4444",borderColor:"#ef4444",transform:"rotate(12deg)"})}} className="st rounded-xl">{dec==="interested"?"INTERESTED":"PASS"}</div>}
<div style={{background:t.bg}} className="px-5 py-4 text-white"><div className="flex items-center justify-between"><span className="text-sm font-medium opacity-90">{t.i} {t.l}</span><span className="text-xs opacity-75">{job.postedDate}</span></div><h3 className="text-lg font-bold mt-1 leading-tight">{job.title}</h3><p className="text-sm opacity-90">{job.company}</p></div>
<div className="px-5 py-4 flex-1 overflow-y-auto sh"><div className="grid grid-cols-2 gap-3 mb-4"><div className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 uppercase" style={{letterSpacing:".05em"}}>Pay Rate</p><p className="text-lg font-bold text-gray-900">{job.pay}</p></div><div className="bg-gray-50 rounded-xl p-3"><p className="text-xs text-gray-500 uppercase" style={{letterSpacing:".05em"}}>Location</p><p className="text-sm font-semibold text-gray-900">{job.location}</p><p className="text-xs text-gray-400">{job.distance}</p></div></div>
<div className="bg-gray-50 rounded-xl p-3 mb-4"><p className="text-xs text-gray-500 uppercase" style={{letterSpacing:".05em"}}>Schedule</p><p className="text-sm font-medium text-gray-800">{job.schedule}</p></div>
{job.highlight&&<div style={{background:"#fffbeb",border:"1px solid #fde68a"}} className="rounded-xl p-3 mb-4"><p className="text-sm font-medium" style={{color:"#92400e"}}>{"\u2728"} {job.highlight}</p></div>}
<div onClick={e=>{e.stopPropagation();setExp(!exp)}} style={{cursor:"pointer"}}><p className={`text-sm text-gray-600 leading-relaxed ${exp?"":"lc2"}`}>{job.description}</p><p className="text-xs text-blue-500 mt-1 font-medium">{exp?"Show less":"Tap to read more"}</p></div>
<div className="flex flex-wrap gap-1 mt-3">{job.tags.map(tag=><span key={tag} className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full">{tag}</span>)}</div></div>
{isTop&&<div className="px-5 py-3 border-t border-gray-100 flex justify-between text-xs text-gray-400"><span>{"\u2190"} Swipe to pass</span><span>Swipe to save {"\u2192"}</span></div>}
</div></div>)}
function ListItem({job,action,actionLabel}){const[open,setOpen]=useState(false);const t=TC[job.type]||TC.locum;
return(<div className="bg-white rounded-xl cs overflow-hidden mb-3 fi"><div className="p-4" style={{cursor:"pointer"}} onClick={()=>setOpen(!open)}><div className="flex items-start justify-between"><div style={{flex:1,minWidth:0}}><span className="text-xs text-white px-2 py-0.5 rounded-full inline-block mb-1" style={{background:t.bg}}>{t.i} {t.l}</span><h4 className="font-semibold text-gray-900 text-sm truncate">{job.title}</h4><p className="text-xs text-gray-500">{job.company} \u00B7 {job.location}</p></div><div className="text-right ml-3 flex-shrink-0"><p className="font-bold text-gray-900 text-sm">{job.pay}</p><p className="text-xs text-gray-400">{job.distance}</p></div></div></div>
{open&&<div className="px-4 pb-4 border-t pt-3" style={{borderColor:"#f3f4f6"}}><p className="text-sm text-gray-600 mb-2">{job.description}</p><p className="text-xs text-gray-500 mb-3">{job.schedule}</p><div className="flex gap-2"><a href={job.url} target="_blank" rel="noopener noreferrer" className="flex-1 text-center text-sm text-white py-2 rounded-lg font-medium as" style={{background:"#3b82f6"}}>View Posting</a><button onClick={e=>{e.stopPropagation();action(job)}} className="text-sm border border-gray-300 text-gray-600 px-4 py-2 rounded-lg as">{actionLabel}</button></div></div>}</div>)}
function RefineCard({q,onAnswer}){return(<div className="bg-white rounded-2xl cs p-5 mb-3 fi"><p className="text-sm font-semibold text-gray-800 mb-3">{q.question}</p>{q.options.map((opt,i)=><button key={i} onClick={()=>onAnswer(q.id,opt)} className="w-full text-left text-sm bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 mb-2 as" style={{transition:"background .15s"}}>{opt}</button>)}</div>)}
function App(){const[tab,setTab]=useState("discover"),[jobs,setJobs]=useState(D.jobs),[saved,setSaved]=useState([]),[passed,setPassed]=useState([]),[questions,setQuestions]=useState(D.refinementQuestions),[answers,setAnswers]=useState({}),[filter,setFilter]=useState("all");
const goR=useCallback(j=>{setSaved(p=>[j,...p]);setJobs(p=>p.filter(x=>x.id!==j.id))},[]);
const goL=useCallback(j=>{setPassed(p=>[j,...p]);setJobs(p=>p.filter(x=>x.id!==j.id))},[]);
const rest=useCallback((j,from)=>{if(from==="saved")setSaved(p=>p.filter(x=>x.id!==j.id));else setPassed(p=>p.filter(x=>x.id!==j.id));setJobs(p=>[j,...p])},[]);
const ans=useCallback((qId,a)=>{setAnswers(p=>({...p,[qId]:a}));setQuestions(p=>p.filter(q=>q.id!==qId))},[]);
const fl=filter==="all"?jobs:jobs.filter(j=>j.type===filter);
const upd=new Date(D.lastUpdated);const ts=upd.toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
const tabs=[{id:"discover",label:"Discover",count:jobs.length,icon:"\u{1F50D}"},{id:"saved",label:"Saved",count:saved.length,icon:"\u2B50"},{id:"passed",label:"Passed",count:passed.length,icon:"\u{1F44B}"},{id:"refine",label:"Refine",count:questions.length,icon:"\u2699\uFE0F"}];
const fils=[{id:"all",label:"All"},{id:"locum",label:"\u{1F3E5} Locum"},{id:"telemedicine",label:"\u{1F4BB} Tele"},{id:"urgent-care",label:"\u{1FA7A} UC"},{id:"consulting",label:"\u{1F4CB} Consult"}];
return(<div style={{minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",background:"#f9fafb"}}>
<div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"12px 16px",position:"sticky",top:0,zIndex:30}}><div className="flex items-center justify-between"><div><h1 style={{fontSize:22,fontWeight:800,color:"#111827",letterSpacing:"-.02em"}}>JobScout</h1><p style={{fontSize:11,color:"#9ca3af"}}>EM & Critical Care Opportunities</p></div><div className="text-right"><p style={{fontSize:11,color:"#9ca3af"}}>Updated</p><p style={{fontSize:11,fontWeight:600,color:"#3b82f6"}}>{ts}</p></div></div></div>
<div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",display:"flex",position:"sticky",top:62,zIndex:30}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 0",textAlign:"center",fontSize:13,fontWeight:600,border:"none",background:"none",cursor:"pointer",position:"relative",color:tab===t.id?"#2563eb":"#9ca3af"}}><span>{t.icon} {t.label}</span>{t.count>0&&<span style={{marginLeft:4,fontSize:11,padding:"1px 6px",borderRadius:99,background:tab===t.id?"#dbeafe":"#f3f4f6",color:tab===t.id?"#1d4ed8":"#9ca3af"}}>{t.count}</span>}{tab===t.id&&<div style={{position:"absolute",bottom:0,left:8,right:8,height:3,background:"#2563eb",borderRadius:99}}/>}</button>)}</div>
<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
{tab==="discover"&&<div style={{flex:1,display:"flex",flexDirection:"column"}}><div className="flex gap-2 sh" style={{padding:"12px 16px",overflowX:"auto"}}>{fils.map(f=><button key={f.id} onClick={()=>setFilter(f.id)} style={{fontSize:12,fontWeight:600,padding:"6px 14px",borderRadius:99,whiteSpace:"nowrap",border:"none",cursor:"pointer",background:filter===f.id?"#2563eb":"#fff",color:filter===f.id?"#fff":"#6b7280",boxShadow:filter===f.id?"none":"inset 0 0 0 1px #e5e7eb"}}>{f.label}</button>)}</div>
<div style={{flex:1,padding:"0 16px 16px",position:"relative",minHeight:400}}>{fl.length===0?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}><div className="text-center"><p style={{fontSize:48,marginBottom:12}}>{"\u{1F3AF}"}</p><p className="font-semibold text-gray-500">All caught up!</p><p className="text-sm text-gray-400" style={{marginTop:4}}>New opportunities at 5 AM & 5 PM</p>{passed.length>0&&<button onClick={()=>setTab("passed")} style={{marginTop:16,fontSize:14,color:"#2563eb",fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>Review passed jobs {"\u2192"}</button>}</div></div>:fl.slice(0,3).map((job,i)=><SwipeCard key={job.id} job={job} isTop={i===0} onRight={goR} onLeft={goL}/>)}</div>
{fl.length>0&&<div style={{display:"flex",justifyContent:"center",gap:24,padding:"16px 0",background:"#f9fafb",flexShrink:0}}><button onClick={()=>goL(fl[0])} className="as" style={{width:56,height:56,borderRadius:"50%",background:"#fff",boxShadow:"0 2px 12px rgba(0,0,0,.1)",border:"2px solid #fca5a5",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444"}}>{"\u2715"}</button><button onClick={()=>goR(fl[0])} className="as" style={{width:56,height:56,borderRadius:"50%",background:"#10b981",boxShadow:"0 2px 12px rgba(16,185,129,.3)",border:"none",fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{"\u2713"}</button></div>}</div>}
{tab==="saved"&&<div style={{padding:16,overflowY:"auto",flex:1}}>{saved.length===0?<div className="text-center" style={{paddingTop:64}}><p style={{fontSize:48,marginBottom:12}}>{"\u2B50"}</p><p className="font-medium text-gray-500">No saved jobs yet</p><p className="text-sm text-gray-400" style={{marginTop:4}}>Swipe right on jobs you are interested in</p></div>:<>{saved.map(j=><ListItem key={j.id} job={j} action={j2=>rest(j2,"saved")} actionLabel="Undo"/>)}</>}</div>}
{tab==="passed"&&<div style={{padding:16,overflowY:"auto",flex:1}}>{passed.length===0?<div className="text-center" style={{paddingTop:64}}><p style={{fontSize:48,marginBottom:12}}>{"\u{1F44B}"}</p><p className="font-medium text-gray-500">No passed jobs</p><p className="text-sm text-gray-400" style={{marginTop:4}}>Jobs you swipe left on appear here</p></div>:<>{passed.map(j=><ListItem key={j.id} job={j} action={j2=>rest(j2,"passed")} actionLabel="Reconsider"/>)}</>}</div>}
{tab==="refine"&&<div style={{padding:16,overflowY:"auto",flex:1}}><p style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".05em",fontWeight:600,marginBottom:4}}>Search Refinement</p><p className="text-sm text-gray-400" style={{marginBottom:16}}>Your answers shape future searches</p>{questions.length>0?questions.map(q=><RefineCard key={q.id} q={q} onAnswer={ans}/>):<div className="text-center" style={{paddingTop:40}}><p style={{fontSize:48,marginBottom:12}}>{"\u2705"}</p><p className="font-medium text-gray-500">All questions answered</p></div>}
{Object.keys(answers).length>0&&<div style={{marginTop:24}}><p style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".05em",fontWeight:600,marginBottom:8}}>Your Preferences</p><div className="bg-white rounded-xl cs p-4">{Object.entries(answers).map(([k,v])=><p key={k} className="text-sm text-gray-600" style={{marginBottom:8}}><span style={{color:"#10b981",marginRight:8}}>{"\u2713"}</span>{v}</p>)}</div></div>}
<div style={{marginTop:24}}><p style={{fontSize:11,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".05em",fontWeight:600,marginBottom:8}}>Search Profile</p><div className="bg-white rounded-xl cs p-4 text-sm text-gray-600"><p><span className="font-medium text-gray-800">Specialty:</span> {D.searchProfile.specialty}</p><p style={{marginTop:4}}><span className="font-medium text-gray-800">Min Rate:</span> {D.searchProfile.minRate}</p><p style={{marginTop:4}}><span className="font-medium text-gray-800">Location:</span> {D.searchProfile.location}</p></div></div></div>}
</div></div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
